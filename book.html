<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rùa Novel | Profile Truyện</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
         body { 
        font-family: 'Quicksand', sans-serif; 
        background: #fafafa; 
        padding-top: 80px; /* Chỉnh số này cho phù hợp với chiều cao header của chị */
    }
    .studio-container { max-width: 800px; margin: 0 auto 30px auto; padding: 0 20px; }
    .tab-menu { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .tab-item { padding: 10px 20px; cursor: pointer; border-radius: 20px; font-weight: 600; color: #666; }
    .tab-item.active { background: #ffe5ec; color: #ff4d6d; }
    .form-section { padding: 25px; border: 1px solid #eee; border-radius: 15px; background: white; }
    /* Dàn cột thẳng hàng */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
    .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Quicksand', sans-serif; font-size: 14px; background: #fff; }
    .btn-action { padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; flex: 1; transition: 0.3s; }
    .btn-primary { background: #ff4d6d; color: white; }
    .btn-reset { background: #f3f4f6; color: #374151; }

    /* Thêm media query để trên điện thoại giao diện tự co giãn cho đẹp */
    @media (max-width: 600px) {
        .form-grid { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>

    <header class="netflix-header">
        <div class="header-left-zone">
            <div class="logo">
                <a href="index.html">Rùa<span>Novel</span></a>
                <span style="font-size: 0.9rem; color: #666; margin-left: 10px;">| Studio</span>
            </div>
        </div>
        <div class="header-right-zone">
            <button class="btn-back" onclick="window.location.href='index.html'" style="background:#ffe5ec;color:#ff4d6d;border:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;">Về Trang Chủ</button>
        </div>
    </header>
    
    <div class="book-container">
        <div class="profile-card">
            <img id="storyCover" src="https://via.placeholder.com/150" alt="Bìa">
            <h1 id="storyTitle" class="story-title">Đang tải thông tin...</h1>
            <p>✒️ <span id="storyAuthor">...</span> | 🚀 Editor: <span id="storyEditor">...</span></p>
            <div id="tagList"></div>
            <div id="storyDesc" class="desc-box">Đang tải mô tả...</div>
        </div>

        <div class="chapter-section" style="background:#fff; padding:20px; border-radius:20px; margin-top:20px;">
            <h3>DANH SÁCH CHƯƠNG</h3>
            <div id="chapterList">Đang tải chương...</div>
            <div id="pagination" style="margin-top:20px; text-align:center;"></div>
        </div>
    </div>

    <!-- Nạp thư viện Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // Cấu hình Firebase (Chị copy từ file firebase.js vào đây)
    const firebaseConfig = {
        apiKey: "AIzaSyBimiEGQcW9at2pOxfdUaJHjim2fmyjjcc",
        authDomain: "dongchanrua.firebaseapp.com",
        databaseURL: "https://dongchanrua-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "dongchanrua",
        storageBucket: "dongchanrua.firebasestorage.app",
        messagingSenderId: "640115424540",
        appId: "1:640115424540:web:c9713b7921c09283150ed9"
    };

    // Khởi tạo v8
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Lấy ID truyện
    const urlParams = new URLSearchParams(window.location.search);
    const storyId = urlParams.get('id');

    async function init() {
        if (!storyId) {
            document.getElementById('storyTitle').innerText = "Lỗi: Không tìm thấy ID!";
            return;
        }

        // Lấy thông tin truyện (Cách v8)
        db.ref('stories/' + storyId).once('value').then(snapshot => {
            if (snapshot.exists()) {
                const s = snapshot.val();
                document.getElementById('storyTitle').innerText = s.title || "Không tên";
                document.getElementById('storyAuthor').innerText = s.author || "Chưa có";
                document.getElementById('storyEditor').innerText = s.editor || "Chưa có";
                document.getElementById('storyDesc').innerText = s.description || "Chưa có mô tả";
                if(s.cover) document.getElementById('storyCover').src = s.cover;
            }
        });

        // Lấy danh sách chương (Cách v8)
        db.ref('chapters/' + storyId).once('value').then(snapChap => {
            const list = document.getElementById('chapterList');
            list.innerHTML = "";
            if (snapChap.exists()) {
                // Object.entries và reverse để đảo ngược danh sách
                const chapters = Object.entries(snapChap.val()).reverse();
                chapters.forEach(([id, data]) => {
                    list.innerHTML += `<a href="read.html?truyen=${storyId}&id=${id}" style="display:block; padding:10px; border-bottom:1px solid #eee; text-decoration:none; color:#333;">${data.title}</a>`;
                });
            } else {
                list.innerHTML = "Chưa có chương nào.";
            }
        });
    }
    init();
</script>
</body>
</html>
