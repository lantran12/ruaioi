<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rùa Novel | Mục lục</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fafafa; padding-top: 80px; }
        .book-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .chapter-list { background: white; padding: 20px; border-radius: 15px; border: 1px solid #eee; }
        .chapter-item { padding: 15px; border-bottom: 1px solid #f0f0f0; display: block; text-decoration: none; color: #333; transition: 0.3s; }
        .chapter-item:hover { background: #fff5f7; color: #ff4d6d; }
        .book-container { max-width: 900px; margin: 40px auto; padding: 20px; }
.book-header-card { display: flex; gap: 30px; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
#storyCover { width: 200px; height: 280px; object-fit: cover; border-radius: 8px; }
.chapter-list-section { background: #fff; padding: 25px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.chapter-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f0f0f0; color: #333; text-decoration: none; }
.chapter-item:hover { color: #ff4d6d; }
    </style>
</head>
<body>

<header class="netflix-header">
        <div class="header-left-zone">
            <div class="logo">
                <a href="index.html">Rùa<span>Novel</span></a>
                <span style="font-size: 0.9rem; color: #666; margin-left: 10px;">| Studio</span>
            </div>
        </div>
        <div class="header-right-zone">
            <button class="btn-back" onclick="window.location.href='index.html'" style="background:#ffe5ec;color:#ff4d6d;border:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;">Về Trang Chủ</button>
        </div>
    </header>

<div class="book-container">
    <!-- Khung thông tin truyện -->
    <div class="book-header-card">
        <img id="storyCover" src="placeholder.jpg" alt="Bìa">
        <div class="story-info">
            <h1 id="storyTitle">Tên truyện</h1>
            <p><strong>Tác giả:</strong> <span id="storyAuthor"></span></p>
            <p><strong>Editor:</strong> <span id="storyEditor"></span></p>
        </div>
    </div>

    <!-- Khung danh sách chương -->
    <div class="chapter-list-section">
        <h3>DANH SÁCH CHƯƠNG</h3>
        <div id="chapterList"></div>
    </div>
</div>

    <script type="module">
        import { db } from "./firebase.js";
        import { ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const storyId = new URLSearchParams(window.location.search).get('id');
        
        async function loadBook() {
            // Lấy info truyện
            const sSnap = await get(ref(db, `stories/${storyId}`));
            if (sSnap.exists()) {
                const s = sSnap.val();
                document.getElementById('storyTitle').innerText = s.title;
                document.getElementById('storyAuthor').innerText = s.author;
                document.getElementById('storyEditor').innerText = s.editor;
                document.getElementById('storyDesc').innerText = s.description;
                document.getElementById('storyCover').src = s.cover;
                if(s.genres) document.getElementById('storyGenres').innerHTML = s.genres.map(g => `<span class="tag-item">${g}</span>`).join('');
            }

            // Lấy danh sách chương
            const cSnap = await get(ref(db, `chapters/${storyId}`));
            const listDiv = document.getElementById('chapterList');
            if (cSnap.exists()) {
                const chapters = Object.entries(cSnap.val()).map(([id, val]) => ({id, ...val}))
                                     .sort((a,b) => a.createdAt - b.createdAt);
                listDiv.innerHTML = chapters.map(ch => 
                    `<a href="read.html?truyen=${storyId}&id=${ch.id}" class="chapter-item">${ch.title}</a>`
                ).join('');
            }
        }
        loadBook();
    </script>
</body>
</html>
