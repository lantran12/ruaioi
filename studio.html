<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio RùaNovel</title>
    <link rel="stylesheet" href="assets/css/style.css">.
    <script src="assets/js/studio.js" type="module"></script>
    <script src="https://cdn.ckeditor.com/ckeditor5/41.0.0/classic/ckeditor.js"></script>
</head>
<body style="background-color: #fcf9fa;">

    <header class="netflix-header">
        <div class="logo"><a href="index.html">Rùa<span>Novel</span></a></div>
    </header>

   <main class="studio-container">
    <div class="studio-header">
        <h1>Chọn truyện để chỉnh sửa</h1>
        <p>Chọn một truyện có sẵn hoặc tạo truyện mới ngay trong danh sách này.</p>
    </div>

    <div class="studio-layout">
        <section id="storyList" class="story-list">
            <div class="story-card add-new" onclick="openCreateForm()">
                <p><strong>+ Tạo truyện mới</strong></p>
                <span>Mở form trắng để tạo truyện</span>
            </div>
            </section>

        <section class="editor-area">
            <div class="form-group">
                <label>Tên truyện *</label>
                <input type="text" id="storyTitle" placeholder="Nhập tên truyện...">
            </div>
            <button class="btn-main" onclick="saveStory()">Lưu truyện</button>
        </section>
    </div>
</main>
<div id="createStoryModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="hideCreateForm()">&times;</span>
        <h2>Tạo truyện mới</h2>
        <div class="form-group">
            <label>Tên truyện</label>
            <input type="text" id="storyTitle" placeholder="Nhập tên truyện...">
        </div>
        <div class="form-group">
            <label>Tác giả</label>
            <input type="text" id="storyAuthor" placeholder="Nhập tên tác giả...">
        </div>
        <button class="btn-main" onclick="saveStory()">Lưu truyện lên Động</button>
    </div>
</div>
</body>
</html>
