<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Studio RùaNovel</title>
    <link rel="stylesheet" href="style.css"> 
    <script src="https://cdn.ckeditor.com/ckeditor5/41.0.0/classic/ckeditor.js"></script>
</head>
<body>
    <header class="netflix-header">
        <div class="logo"><a href="index.html">Rùa<span>Novel</span></a></div>
    </header>

    <main class="studio-grid">
        <aside class="story-list-sidebar">
            <h3>Truyện của Chị</h3>
            <div id="storyListContainer"></div>
        </aside>

        <section class="work-area">
            <h2 id="currentStoryTitle">Chọn truyện để sửa</h2>
            <input type="text" id="chapterTitle" placeholder="Tên chương mới...">
            <div id="editor"></div>
            <button class="btn-main" onclick="saveChapter()">Lưu chương lên Động</button>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="assets/js/studio.js" type="module"></script>
</body>
</html>
