<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rùa Novel | Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
<style>
    /* 1. Bổ sung padding-top để nội dung luôn nằm dưới header */
    body { 
        font-family: 'Quicksand', sans-serif; 
        background: #fafafa; 
        padding-top: 80px; /* Chỉnh số này cho phù hợp với chiều cao header của chị */
    }
    .studio-container { max-width: 800px; margin: 0 auto 30px auto; padding: 0 20px; }
    .tab-menu { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .tab-item { padding: 10px 20px; cursor: pointer; border-radius: 20px; font-weight: 600; color: #666; }
    .tab-item.active { background: #ffe5ec; color: #ff4d6d; }
    .form-section { padding: 25px; border: 1px solid #eee; border-radius: 15px; background: white; }
    /* Dàn cột thẳng hàng */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
    .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Quicksand', sans-serif; font-size: 14px; background: #fff; }
    .btn-action { padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; flex: 1; transition: 0.3s; }
    .btn-primary { background: #ff4d6d; color: white; }
    .btn-reset { background: #f3f4f6; color: #374151; }

    /* Thêm media query để trên điện thoại giao diện tự co giãn cho đẹp */
    @media (max-width: 600px) {
        .form-grid { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>

    <header class="netflix-header">
        <div class="header-left-zone">
            <div class="logo">
                <a href="index.html">Rùa<span>Novel</span></a>
                <span style="font-size: 0.9rem; color: #666; margin-left: 10px;">| Studio</span>
            </div>
        </div>
        <div class="header-right-zone">
            <button class="btn-back" onclick="window.location.href='index.html'" style="background:#ffe5ec;color:#ff4d6d;border:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;">Về Trang Chủ</button>
        </div>
    </header>

    <main class="studio-container">
    <div style="margin-bottom: 25px; border-bottom: 2px solid #ff4d6d; padding-bottom: 10px;">
        <h1 style="color: #333; margin: 0;">Quản Lý Truyện</h1>
    </div>

    <div id="manageContent">
        <section class="form-section">
            <h2>Thông tin truyện mới</h2>
            <div class="form-grid">
                <div class="form-group"><label>ID viết liền không dấu *</label><input type="text" id="idInput" class="form-control" placeholder="Ví dụ: zombie, kiss..."></div>
                <div class="form-group"><label>Tên truyện *</label><input type="text" id="titleInput" class="form-control" placeholder="Nhập tên truyện..."></div>
            </div>
            <div class="form-grid">
                <div class="form-group"><label>Tên tác giả *</label><input type="text" id="authorInput" class="form-control" placeholder="Tên tác giả..."></div>
                <div class="form-group"><label>Trạng thái</label>
                    <select id="statusSelect" class="form-control">
                        <option value="Đang cập nhật">Đang cập nhật</option>
                        <option value="Hoàn thành">Trọn bộ</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Thể loại</label>
                <div class="form-control" onclick="openGenreModal()" style="cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
                    <span id="selectedGenresText">Chọn thể loại...</span>
                    <i class="fa-solid fa-plus"></i>
                </div>
            </div>
            <div class="form-group"><label>Bìa truyện (Link ảnh)</label><input type="text" id="coverInput" class="form-control" placeholder="Dán link ảnh bìa vào đây..."></div>
            <div class="form-group"><label>Giới thiệu</label><textarea id="descInput" class="form-control" rows="3" placeholder="Viết giới thiệu ngắn..."></textarea></div>
            <div class="form-group"><label>Editor dò mìn</label><input type="text" id="editorNote" class="form-control" placeholder="Ghi chú nếu có..."></div>
            <div style="display: flex; gap: 15px; margin-top: 25px;">
                <button type="button" onclick="resetForm()" class="btn-action btn-reset">Làm mới form</button>
                <button type="button" onclick="handleCreateStory()" class="btn-action btn-primary">Đăng tải</button>
            </div>
        </section>

        <section id="manageStoriesSection" style="margin-top: 50px; padding: 20px; border-top: 2px dashed #ff4d6d;">
    <h2 style="color: #ff4d6d;">📋 Danh sách truyện đã đăng</h2>
    <div id="adminStoryList" style="margin-top: 20px;"></div>
</section>

<div id="postChapterModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px;">
        <h3>Đăng chương mới</h3>
        <p id="modalStoryTitle" style="font-weight: bold; color: #ff4d6d;"></p>
        <input type="hidden" id="modalStoryId">
        <input type="file" id="chapterFileInput" class="form-control" accept=".txt,.docx" style="margin-bottom: 15px;">
        <div style="display: flex; gap: 10px;">
            <button onclick="closePostModal()" class="btn-action btn-reset">Đóng</button>
            <button onclick="handleUploadContent()" class="btn-action btn-primary">Xác nhận đăng</button>
        </div>
    </div>
</div>
</main>

    <div id="genreModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto;">
            <h3 style="margin-top: 0; font-family: 'Playfair Display', serif;">Chọn thể loại</h3>
            <div id="genreModalContainer" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0;"></div>
            <button onclick="closeGenreModal()" class="btn-action btn-primary" style="width: 100%;">Xong</button>
        </div>
    </div>

    <script type="module" src="assets/js/studio.js"></script>
<script src="assets/js/config.js"></script>
<script>
    // --- PHẦN 1: ĐIỀU KHIỂN TAB ---
    function switchTab(tab) {
        document.getElementById('manageContent').style.display = (tab === 'manage') ? 'block' : 'none';
        document.getElementById('postContent').style.display = (tab === 'post') ? 'block' : 'none';
        
        document.getElementById('tab-manage').classList.toggle('active', tab === 'manage');
        document.getElementById('tab-post').classList.toggle('active', tab === 'post');
        
        if (tab === 'post') loadStoryListForSelect();
    }

    // --- PHẦN 2: LOAD DANH SÁCH TRUYỆN VÀO SELECT (DÙNG TRONG TAB ĐĂNG TRUYỆN) ---
    function loadStoryListForSelect() {
        const select = document.getElementById('storySelect');
        // Giả sử chị có dữ liệu truyện trong Firebase (thường lưu ở ref(db, 'stories'))
        // Đoạn này chị cần kết nối với file studio.js của chị để lấy dữ liệu
        // Ví dụ cơ bản:
        console.log("Đang load danh sách truyện...");
    }

    // --- PHẦN 3: XỬ LÝ THỂ LOẠI (CŨ CỦA CHỊ) ---
    function openGenreModal() { document.getElementById('genreModal').style.display = 'flex'; }
    
    function closeGenreModal() {
        document.getElementById('genreModal').style.display = 'none';
        const checkboxes = document.querySelectorAll('#genreModalContainer input:checked');
        document.getElementById('selectedGenresText').innerText = checkboxes.length > 0 ? `Đã chọn ${checkboxes.length} thể loại` : "Chọn thể loại...";
    }

    // Tạo checkbox thể loại
    if (typeof GENDERS !== 'undefined') {
        const container = document.getElementById('genreModalContainer');
        GENDERS.forEach(item => {
            let label = document.createElement('label');
            label.style.padding = "8px"; label.style.border = "1px solid #eee"; label.style.borderRadius = "6px"; label.style.cursor = "pointer";
            label.innerHTML = `<input type="checkbox" value="${item.name}" style="margin-right: 5px;"> ${item.name}`;
            container.appendChild(label);
        });
    }
</script>
</body>
</html>
