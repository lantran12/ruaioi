<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Studio RùaNovel</title>
    <link rel="stylesheet" href="assets/css/style.css">.
    <script src="https://cdn.ckeditor.com/ckeditor5/41.0.0/classic/ckeditor.js"></script>
</head>
<body style="background-color: #fcf9fa;">

    <header class="netflix-header">
        <div class="logo"><a href="index.html">Rùa<span>Novel</span></a></div>
    </header>

    <main class="studio-grid" style="margin-top: 100px;">
        <aside class="story-list-sidebar">
            <h3 style="margin-bottom: 20px;">Truyện của Chị</h3>
            <div class="studio-story-card" style="border: 2px dashed #ff4d6d;">+ Tạo truyện mới</div>
            <div id="storyListContainer"></div>
        </aside>

        <section class="work-area">
            <h2 style="font-family: var(--font-serif); margin-bottom: 20px;">Thông tin truyện mới</h2>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label>Tên truyện *</label>
                <input type="text" placeholder="Nhập tên truyện..." style="width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px;">
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>Tên tác giả *</label>
                <input type="text" placeholder="Nhập tên tác giả..." style="width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px;">
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>Phân loại & Tiến độ</label>
                <select style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px;">
                    <option>Đam Mỹ</option>
                    <option>Ngôn Tình</option>
                </select>
                <select style="width: 100%; padding: 12px; border-radius: 8px;">
                    <option>Đang cập nhật</option>
                    <option>Hoàn thành</option>
                </select>
            </div>

            <div id="editor"></div>
            <button class="btn-main" style="margin-top: 20px; width: 100%;">Lưu chương lên Động</button>
        </section>
    </main>

    <script src="assets/js/studio.js" type="module"></script>
</body>
</html>
