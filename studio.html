<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Studio Động Chăn Rùa</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>
    <header class="netflix-header">
        <div class="logo"><a href="index.html">ĐỘNG<span>CHĂNRÙA</span></a></div>
        <button onclick="openUploadModal()" class="btn-auth-submit" style="width:auto; padding: 10px 20px;">➕ Đăng truyện mới</button>
    </header>

    <main class="netflix-section" style="margin-top: 100px;">
        <h2>Danh sách tác phẩm</h2>
        <div id="adminStoryGrid" class="netflix-row-grid">
            </div>
    </main>

    <div id="uploadModal" class="modal-custom">
        <div class="modal-content-custom">
            <span class="close-modal-btn" onclick="closeModal()">&times;</span>
            <h3>Đăng tác phẩm mới</h3>
            <div class="form-group-custom">
                <label>Tên truyện</label>
                <input type="text" id="inputTitle" class="input-custom">
            </div>
            <button onclick="saveStory()" class="btn-submit-custom">Xác nhận đăng</button>
        </div>
    </div>

    <script>
        // Khởi tạo Firebase như cũ
        // Hàm load dữ liệu: 
        function loadAdminStories() {
            db.ref('stories').on('value', (snapshot) => {
                const grid = document.getElementById('adminStoryGrid');
                grid.innerHTML = '';
                snapshot.forEach(child => {
                    const card = createAdminCard(child.key, child.val());
                    grid.appendChild(card);
                });
            });
        }
        
        // Hàm đăng truyện:
        function saveStory() {
            const title = document.getElementById('inputTitle').value;
            db.ref('stories').push({ title: title, updatedAt: Date.now() })
            .then(() => { alert("Đã đăng!"); closeModal(); });
        }
        
        // ... Các hàm đóng mở modal
    </script>
</body>
</html>
