<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Rùa Novel Studio | Đăng Chương</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fafafa; padding: 20px; }
        .wrapper { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tab { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; background: #eee; }
        .tab button.active { background: #ff4d6d; color: white; }
        .section { display: none; }
        .section.active { display: block; }
        .form-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 8px; background: #ff4d6d; color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2 id="storyTitle">Đăng chương cho: ...</h2>
    <div class="tab">
        <button class="active" onclick="showTab('single', this)">Đăng lẻ</button>
        <button onclick="showTab('bulk', this)">Import Hàng Loạt</button>
    </div>

    <div id="single-section" class="section active">
        <input type="number" id="chapNum" class="form-control" placeholder="Số chương">
        <input type="text" id="chapTitle" class="form-control" placeholder="Tên chương">
        <input type="text" id="chapPass" class="form-control" placeholder="Mật khẩu (nếu có)">
        <textarea id="chapContent" class="form-control" rows="10" placeholder="Nội dung..."></textarea>
        <button class="btn-main" onclick="uploadSingle()">Đăng chương ngay</button>
    </div>

    <div id="bulk-section" class="section">
        <input type="file" id="fileInput" onchange="handleBulkImport(this)" accept=".txt,.docx" class="form-control">
        <div id="previewTableBody"></div>
        <button id="btnConfirmImport" class="btn-main" style="display:none;" onclick="saveAllChaptersToFirebase()">Xác Nhận Import Hàng Loạt</button>
    </div>
</div>

<script>
    // Cấu hình Firebase của chị
    const firebaseConfig = {
        apiKey: "AIzaSyBimiEGQcW9at2pOxfdUaJHjim2fmyjjcc",
        authDomain: "dongchanrua.firebaseapp.com",
        databaseURL: "https://dongchanrua-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "dongchanrua",
        storageBucket: "dongchanrua.firebasestorage.app",
        messagingSenderId: "640115424540",
        appId: "1:640115424540:web:c9713b7921c09283150ed9"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const storyId = new URLSearchParams(window.location.search).get('id');
    let parsedChaptersList = [];

    // Lấy tên truyện
    db.ref('stories/' + storyId).once('value').then(s => { if(s.exists()) document.getElementById('storyTitle').innerText = "Đăng cho: " + s.val().title; });

    function showTab(type, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab button').forEach(b => b.classList.remove('active'));
        document.getElementById(type + '-section').classList.add('active');
        btn.classList.add('active');
    }

    // Đăng lẻ
    async function uploadSingle() {
        const num = document.getElementById('chapNum').value;
        await db.ref(`stories/${storyId}/chapters/chap_${num}`).set({
            title: document.getElementById('chapTitle').value,
            content: document.getElementById('chapContent').value,
            password: document.getElementById('chapPass').value,
            updatedAt: Date.now()
        });
        alert("Đăng thành công!");
    }

    // Import (Hàm của chị)
    function handleBulkImport(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) { 
            const text = e.target.result;
            // Thuật toán tách chương của chị
            const lines = text.split(/\r?\n/);
            const regex = /^\s*Chương\s+(\d+)\s*[:\-\s]\s*(.*)$/i;
            let current = null;
            parsedChaptersList = [];

            lines.forEach(line => {
                const match = line.match(regex);
                if(match) {
                    if(current) parsedChaptersList.push(current);
                    current = { number: match[1], title: line, content: "" };
                } else if(current) current.content += line + "\n";
            });
            if(current) parsedChaptersList.push(current);
            document.getElementById('btnConfirmImport').style.display = 'block';
            alert("Đã bóc tách xong " + parsedChaptersList.length + " chương!");
        };
        reader.readAsText(file);
    }

    async function saveAllChaptersToFirebase() {
        for(let ch of parsedChaptersList) {
            await db.ref(`stories/${storyId}/chapters/chap_${ch.number}`).set({
                title: ch.title,
                content: ch.content,
                updatedAt: Date.now()
            });
        }
        alert("Import hoàn tất!");
    }
</script>
</body>
</html>
